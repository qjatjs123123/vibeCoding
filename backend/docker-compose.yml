version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: vibecoding-postgres
    environment:
      POSTGRES_USER: vibecoding
      POSTGRES_PASSWORD: vibecoding_password
      POSTGRES_DB: vibecoding
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibecoding"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
